<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fdf8f0; --bg-alt: #f4ead8;
    --ink: #2a2520; --ink-soft: #5a5249; --ink-muted: #8a8076;
    --pulse: #e94560; --pulse-soft: #fdebee;
    --sage: #6fa885; --sage-soft: #e3f0e8;
    --line: #e8dec9;
  }
  html { -webkit-font-smoothing: antialiased; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 56px 48px;
    max-width: 540px;
    text-align: center;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
  }
  .glyph {
    font-size: 4.5rem;
    margin-bottom: 18px;
    line-height: 1;
  }
  h1 {
    font-size: clamp(1.8rem, 4vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  h1 em { color: var(--pulse); font-style: normal; }
  p { color: var(--ink-soft); margin-bottom: 24px; font-size: 1.05rem; }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 28px;
  }
  a.btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 100px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    transition: transform .12s ease, box-shadow .15s ease, background .15s;
    white-space: nowrap;
  }
  a.btn-primary {
    background: var(--pulse);
    color: white;
    box-shadow: 0 6px 16px rgba(233, 69, 96, .18);
  }
  a.btn-primary:hover {
    background: #d9304a;
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(233, 69, 96, .25);
  }
  a.btn-soft {
    background: white;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  a.btn-soft:hover {
    background: var(--bg-alt);
    transform: translateY(-1px);
  }
  .quick-links {
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 0.88rem;
    color: var(--ink-muted);
  }
  .quick-links a { color: var(--ink-soft); margin: 0 8px; }
  .quick-links a:hover { color: var(--pulse); }
  @media (max-width: 480px) {
    .card { padding: 40px 28px; border-radius: 20px; }
    .glyph { font-size: 3.5rem; }
  }
</style>

<body>
<div class="card">

  <p>

  </p>
  <div class="actions">
    <a href="/welcome.html" class="btn btn-primary">Home →</a>

  </div>
  <div class="quick-links">
    <a href="/guide.html">The Guide</a> ·
    <a href="/ecosystem.html">Ecosystem</a> ·
    <a href="/app/">Open the app</a>
  </div>
</div>
</body>
</html>
