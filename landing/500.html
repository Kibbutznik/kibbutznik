<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something broke — Kibbutznik</title>
<meta name="description" content="Something on our end isn't working. Try again in a minute.">
<meta name="theme-color" content="#fdf8f0">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fdf8f0; --bg-alt: #f4ead8;
    --ink: #2a2520; --ink-soft: #5a5249; --ink-muted: #8a8076;
    --pulse: #e94560; --pulse-soft: #fdebee;
    --line: #e8dec9;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 56px 48px;
    max-width: 540px;
    text-align: center;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
  }
  .glyph { font-size: 4.5rem; margin-bottom: 18px; line-height: 1; }
  h1 {
    font-size: clamp(1.8rem, 4vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
  }
  h1 em { color: var(--pulse); font-style: normal; }
  p { color: var(--ink-soft); margin-bottom: 16px; font-size: 1.05rem; }
  .actions {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-top: 28px;
  }
  a.btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; border-radius: 100px;
    font-weight: 600; font-size: 0.95rem;
    text-decoration: none; transition: transform .12s, background .15s, box-shadow .15s;
    white-space: nowrap;
  }
  a.btn-primary {
    background: var(--pulse); color: white;
    box-shadow: 0 6px 16px rgba(233, 69, 96, .18);
  }
  a.btn-primary:hover { background: #d9304a; transform: translateY(-1px); }
  a.btn-soft {
    background: white; color: var(--ink); border: 1px solid var(--line);
  }
  a.btn-soft:hover { background: var(--bg-alt); transform: translateY(-1px); }
  @media (max-width: 480px) {
    .card { padding: 40px 28px; border-radius: 20px; }
    .glyph { font-size: 3.5rem; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="glyph">🌧️</div>
  <h1>Something <em>broke on our end</em>.</h1>
  <p>This is on us, not on you. The page tried to do something and it didn't work.</p>
  <p style="font-size:0.9rem; color: var(--ink-muted);">If this keeps happening, ping us on GitHub with the URL you were trying to load.</p>
  <div class="actions">
    <a href="/welcome.html" class="btn btn-primary">Back home →</a>
    <a href="https://github.com/Kibbutznik/kibbutznik/issues" class="btn btn-soft">Report an issue</a>
  </div>
</div>
</body>
</html>
