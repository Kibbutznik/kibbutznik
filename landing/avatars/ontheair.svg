<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ONTHEAIR: A live broadcast signal / radio tower - active voting happening -->
  <defs>
    <filter id="otag"><feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#e94560" stroke-width="2" opacity="0.9"/>
  <!-- Radio tower -->
  <g transform="translate(40,42)">
    <!-- Tower body -->
    <line x1="0" y1="-20" x2="0" y2="14" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Tower base -->
    <line x1="-8" y1="14" x2="8" y2="14" stroke="#e94560" stroke-width="2" stroke-linecap="round"/>
    <line x1="-5" y1="10" x2="5" y2="10" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Beacon at top -->
    <circle r="3" cy="-20" fill="#e94560" filter="url(#otag)">
      <animate attributeName="r" values="2.5;4;2.5" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Broadcast waves -->
  <g transform="translate(40,22)" fill="none" stroke="#e94560" stroke-linecap="round">
    <path d="M-10,-4 Q-10,-12 0,-12 Q10,-12 10,-4" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0;0.5" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M-16,-6 Q-16,-20 0,-20 Q16,-20 16,-6" stroke-width="1.2" opacity="0.3">
      <animate attributeName="opacity" values="0;0.4;0" dur="1.2s" repeatCount="indefinite"/>
    </path>
    <path d="M-22,-8 Q-22,-28 0,-28 Q22,-28 22,-8" stroke-width="1" opacity="0.2">
      <animate attributeName="opacity" values="0.3;0;0.3" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- "LIVE" dot -->
  <circle cx="58" cy="56" r="3" fill="#e94560">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
