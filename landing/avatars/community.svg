<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- COMMUNITY: A hexagon with connected people nodes inside -->
  <defs>
    <linearGradient id="cmg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecca3"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="url(#cmg)" stroke-width="2" opacity="0.9"/>
  <!-- Hexagon -->
  <polygon points="40,12 62,26 62,54 40,68 18,54 18,26"
    fill="none" stroke="url(#cmg)" stroke-width="1.5" opacity="0.5"/>
  <!-- People nodes at vertices -->
  <circle cx="40" cy="12" r="4" fill="#4ecca3" opacity="0.8"/>
  <circle cx="62" cy="26" r="4" fill="#f0c040" opacity="0.8"/>
  <circle cx="62" cy="54" r="4" fill="#e94560" opacity="0.8"/>
  <circle cx="40" cy="68" r="4" fill="#4ecca3" opacity="0.8"/>
  <circle cx="18" cy="54" r="4" fill="#f0c040" opacity="0.8"/>
  <circle cx="18" cy="26" r="4" fill="#e94560" opacity="0.8"/>
  <!-- Cross connections -->
  <g stroke="#4ecca3" stroke-width="0.6" opacity="0.2">
    <line x1="40" y1="12" x2="62" y2="54"/>
    <line x1="40" y1="12" x2="18" y2="54"/>
    <line x1="62" y1="26" x2="18" y2="54"/>
    <line x1="62" y1="26" x2="40" y2="68"/>
    <line x1="18" y1="26" x2="62" y2="54"/>
    <line x1="18" y1="26" x2="40" y2="68"/>
  </g>
  <!-- Central pulse -->
  <circle cx="40" cy="40" r="5" fill="#fff" opacity="0.3">
    <animate attributeName="r" values="4;7;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
