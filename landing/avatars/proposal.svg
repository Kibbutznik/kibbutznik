<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- PROPOSAL: A scroll/document with a rising arrow. Ideas becoming real. -->
  <defs>
    <linearGradient id="prg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4ecca3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4ecca3"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#4ecca3" stroke-width="2" opacity="0.9"/>
  <!-- Document shape -->
  <rect x="22" y="18" width="30" height="38" rx="3" fill="none" stroke="#4ecca3" stroke-width="1.5" opacity="0.7"/>
  <rect x="22" y="18" width="30" height="38" rx="3" fill="#4ecca3" opacity="0.1"/>
  <!-- Text lines on document -->
  <line x1="27" y1="27" x2="47" y2="27" stroke="#4ecca3" stroke-width="1.5" opacity="0.5"/>
  <line x1="27" y1="33" x2="44" y2="33" stroke="#4ecca3" stroke-width="1.5" opacity="0.4"/>
  <line x1="27" y1="39" x2="40" y2="39" stroke="#4ecca3" stroke-width="1.5" opacity="0.3"/>
  <!-- Rising arrow (proposal ascending) -->
  <g opacity="0.9">
    <line x1="58" y1="55" x2="58" y2="22" stroke="#f0c040" stroke-width="2" stroke-linecap="round">
      <animate attributeName="y2" values="28;20;28" dur="2s" repeatCount="indefinite"/>
    </line>
    <polyline points="52,28 58,20 64,28" fill="none" stroke="#f0c040" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="transform" values="translate(0,2);translate(0,-4);translate(0,2)" dur="2s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <!-- Sparkle -->
  <circle cx="58" cy="18" r="2" fill="#f0c040" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
