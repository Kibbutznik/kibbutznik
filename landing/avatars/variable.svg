<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- VARIABLE: Slider/dial - tunable governance thresholds -->
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#f0c040" stroke-width="2" opacity="0.9"/>
  <!-- Slider track -->
  <line x1="16" y1="40" x2="64" y2="40" stroke="#f0c040" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <!-- Slider fill -->
  <line x1="16" y1="40" x2="44" y2="40" stroke="#f0c040" stroke-width="2" opacity="0.6" stroke-linecap="round">
    <animate attributeName="x2" values="40;50;35;44" dur="4s" repeatCount="indefinite"/>
  </line>
  <!-- Slider knob -->
  <circle cy="40" r="5" fill="#f0c040" opacity="0.8" stroke="#fff" stroke-width="1">
    <animate attributeName="cx" values="40;50;35;44" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Percentage display -->
  <text x="40" y="28" text-anchor="middle" font-family="monospace" font-size="11" fill="#f0c040" opacity="0.7">
    50%
    <animate attributeName="textContent" values="50%;62%;44%;55%" dur="4s" repeatCount="indefinite"/>
  </text>
  <!-- Tick marks -->
  <g stroke="#f0c040" stroke-width="0.8" opacity="0.2">
    <line x1="16" y1="45" x2="16" y2="48"/>
    <line x1="28" y1="45" x2="28" y2="48"/>
    <line x1="40" y1="45" x2="40" y2="48"/>
    <line x1="52" y1="45" x2="52" y2="48"/>
    <line x1="64" y1="45" x2="64" y2="48"/>
  </g>
</svg>
