<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ARTIFACT: A gem/crystal being crafted - the productive output -->
  <defs>
    <linearGradient id="artg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecca3"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>
  </defs>
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#f0c040" stroke-width="2" opacity="0.9"/>
  <!-- Diamond/gem shape -->
  <g transform="translate(40,38)">
    <polygon points="0,-18 14,-4 0,18 -14,-4" fill="url(#artg)" opacity="0.25"
      stroke="url(#artg)" stroke-width="1.5" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Inner facets -->
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#f0c040" stroke-width="0.8" opacity="0.4"/>
    <line x1="-14" y1="-4" x2="14" y2="-4" stroke="#f0c040" stroke-width="0.8" opacity="0.4"/>
    <!-- Sparkle at top -->
    <g opacity="0">
      <line x1="-4" y1="-22" x2="4" y2="-22" stroke="#fff" stroke-width="1"/>
      <line x1="0" y1="-26" x2="0" y2="-18" stroke="#fff" stroke-width="1"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
    </g>
    <!-- Side sparkle -->
    <circle cx="16" cy="-8" r="1.5" fill="#f0c040" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
