<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- MEMBER: A person with a connection aura - part of the community -->
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#4ecca3" stroke-width="2" opacity="0.9"/>
  <!-- Person silhouette -->
  <g transform="translate(40,36)">
    <!-- Head -->
    <circle r="8" cy="-6" fill="#4ecca3" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="10" ry="12" fill="#4ecca3" opacity="0.4"/>
    <!-- Arms reaching out (cooperation) -->
    <path d="M-10,6 Q-20,0 -18,-6" fill="none" stroke="#4ecca3" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <animate attributeName="d" values="M-10,6 Q-20,0 -18,-6;M-10,6 Q-22,-2 -20,-8;M-10,6 Q-20,0 -18,-6" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M10,6 Q20,0 18,-6" fill="none" stroke="#4ecca3" stroke-width="2" stroke-linecap="round" opacity="0.5">
      <animate attributeName="d" values="M10,6 Q20,0 18,-6;M10,6 Q22,-2 20,-8;M10,6 Q20,0 18,-6" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- Connection aura -->
  <circle cx="40" cy="36" r="22" fill="none" stroke="#4ecca3" stroke-width="0.8"
    stroke-dasharray="3 5" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate"
      from="0 40 36" to="360 40 36" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
