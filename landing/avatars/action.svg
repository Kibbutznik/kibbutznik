<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ACTION: A gear/cog representing working groups doing productive work -->
  <defs>
    <filter id="agl"><feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#f0c040" stroke-width="2" opacity="0.9"/>
  <!-- Gear -->
  <g transform="translate(40,40)" filter="url(#agl)">
    <circle r="12" fill="none" stroke="#f0c040" stroke-width="2" opacity="0.8"/>
    <circle r="5" fill="#f0c040" opacity="0.4"/>
    <!-- Gear teeth -->
    <g stroke="#f0c040" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="-13" x2="0" y2="-20"/>
      <line x1="13" y1="0" x2="20" y2="0"/>
      <line x1="0" y1="13" x2="0" y2="20"/>
      <line x1="-13" y1="0" x2="-20" y2="0"/>
      <line x1="9" y1="-9" x2="14" y2="-14"/>
      <line x1="9" y1="9" x2="14" y2="14"/>
      <line x1="-9" y1="9" x2="-14" y2="14"/>
      <line x1="-9" y1="-9" x2="-14" y2="-14"/>
    </g>
    <animateTransform attributeName="transform" type="rotate"
      from="0" to="360" dur="8s" repeatCount="indefinite" additive="sum"/>
  </g>
  <!-- Small rotating indicator -->
  <circle cx="40" cy="40" r="28" fill="none" stroke="#f0c040" stroke-width="0.5"
    stroke-dasharray="4 8" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate"
      from="0 40 40" to="-360 40 40" dur="12s" repeatCount="indefinite"/>
  </circle>
</svg>
