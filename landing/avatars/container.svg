<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ARTIFACT CONTAINER: A box/chest that holds artifacts, with items inside -->
  <circle cx="40" cy="40" r="36" fill="#1a1a2e" stroke="#f0c040" stroke-width="2" opacity="0.9"/>
  <!-- Box body -->
  <rect x="16" y="30" width="48" height="24" rx="2" fill="#f0c040" opacity="0.15"
    stroke="#f0c040" stroke-width="1.5"/>
  <!-- Box lid (slightly open) -->
  <g>
    <rect x="14" y="24" width="52" height="8" rx="2" fill="#f0c040" opacity="0.25"
      stroke="#f0c040" stroke-width="1.5"/>
    <animate attributeName="transform" values="translate(0,0);translate(0,-3);translate(0,0)"
      dur="3s" repeatCount="indefinite"/>
  </g>
  <!-- Items peeking out -->
  <g opacity="0.7">
    <rect x="22" y="27" width="6" height="10" rx="1" fill="#4ecca3" opacity="0.6">
      <animate attributeName="y" values="29;25;29" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="32" y="27" width="6" height="12" rx="1" fill="#e94560" opacity="0.5">
      <animate attributeName="y" values="27;23;27" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="42" y="27" width="6" height="8" rx="1" fill="#f0c040" opacity="0.6">
      <animate attributeName="y" values="30;26;30" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Glow from inside -->
  <ellipse cx="40" cy="28" rx="15" ry="5" fill="#f0c040" opacity="0">
    <animate attributeName="opacity" values="0;0.15;0" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>
