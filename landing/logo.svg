<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Radial glow behind the hexagon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <!-- Hexagon fill gradient -->
    <linearGradient id="hexFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <!-- Pulse line gradient -->
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ecca3" stop-opacity="0.2"/>
      <stop offset="25%" stop-color="#4ecca3"/>
      <stop offset="50%" stop-color="#e94560"/>
      <stop offset="75%" stop-color="#4ecca3"/>
      <stop offset="100%" stop-color="#4ecca3" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Accent stroke gradient for hexagon -->
    <linearGradient id="hexStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ecca3"/>
      <stop offset="50%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#f0c040"/>
    </linearGradient>
  </defs>

  <!-- Background circle glow -->
  <circle cx="256" cy="256" r="250" fill="url(#glow)"/>

  <!-- Main hexagon (community) -->
  <polygon
    points="256,52 443,148 443,340 256,436 69,340 69,148"
    fill="url(#hexFill)"
    stroke="url(#hexStroke)"
    stroke-width="6"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon (action/sub-community) -->
  <polygon
    points="256,120 370,186 370,318 256,384 142,318 142,186"
    fill="none"
    stroke="#4ecca3"
    stroke-width="2"
    stroke-opacity="0.3"
    stroke-linejoin="round"
  />

  <!-- Pulse heartbeat line across the center -->
  <polyline
    points="80,256 160,256 190,256 210,220 230,310 256,170 282,340 302,210 322,280 340,256 360,256 432,256"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Pulse line glow (duplicate, wider, translucent) -->
  <polyline
    points="80,256 160,256 190,256 210,220 230,310 256,170 282,340 302,210 322,280 340,256 360,256 432,256"
    fill="none"
    stroke="#e94560"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.15"
  />

  <!-- Community member dots around the hexagon vertices -->
  <circle cx="256" cy="52"  r="10" fill="#4ecca3" opacity="0.9"/>
  <circle cx="443" cy="148" r="10" fill="#4ecca3" opacity="0.9"/>
  <circle cx="443" cy="340" r="10" fill="#f0c040" opacity="0.9"/>
  <circle cx="256" cy="436" r="10" fill="#e94560" opacity="0.9"/>
  <circle cx="69"  cy="340" r="10" fill="#f0c040" opacity="0.9"/>
  <circle cx="69"  cy="148" r="10" fill="#4ecca3" opacity="0.9"/>

  <!-- Small connecting lines from dots inward (governance links) -->
  <line x1="256" y1="62" x2="256" y2="120" stroke="#4ecca3" stroke-width="1.5" opacity="0.3"/>
  <line x1="433" y1="155" x2="370" y2="186" stroke="#4ecca3" stroke-width="1.5" opacity="0.3"/>
  <line x1="433" y1="333" x2="370" y2="318" stroke="#f0c040" stroke-width="1.5" opacity="0.3"/>
  <line x1="256" y1="426" x2="256" y2="384" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
  <line x1="79"  y1="333" x2="142" y2="318" stroke="#f0c040" stroke-width="1.5" opacity="0.3"/>
  <line x1="79"  y1="155" x2="142" y2="186" stroke="#4ecca3" stroke-width="1.5" opacity="0.3"/>

  <!-- "KBZ" text at bottom of hexagon -->
  <text x="256" y="420" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="48" letter-spacing="8"
        fill="#ffffff" opacity="0.9">
    KBZ
  </text>
</svg>
