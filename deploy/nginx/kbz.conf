# Nginx config for kibbutznik.org — tracked in-repo so future deploy
# changes are reviewable. Copy to /etc/nginx/sites-enabled/kbz on the
# server and `nginx -s reload`.
#
# Path map:
#   /                         → landing (/opt/kbz/landing/index.html)
#   /memory.html, /index.html → landing static pages
#   /favicon.svg, /logo.svg   → landing assets
#   /avatars/                 → landing/avatars/
#   /app/                     → NEW: human product SPA (/opt/kbz/app/)
#   /kbz/                     → FastAPI backend (127.0.0.1:8000), strips /kbz
#   /kbz_starter/             → auxiliary starter API (127.0.0.1:8001)
#   /terminal/                → ttyd bridge (127.0.0.1:7681)

server {
    server_name kibbutznik.org www.kibbutznik.org;

    location /avatars/ {
        root /opt/kbz/landing;
        expires 7d;
    }

    location ~ ^/(favicon.svg|logo.svg)$ {
        root /opt/kbz/landing;
        expires 7d;
    }

    location = / {
        root /opt/kbz/landing;
        try_files /index.html =404;
        default_type text/html;
        expires 1h;
    }

    # Static landing pages (index.html, memory.html, …)
    location ~ ^/(index|memory)\.html$ {
        root /opt/kbz/landing;
        default_type text/html;
        expires 1h;
    }

    # ── Human product (Track C1+C MVP) ─────────────────────────
    # Strips the /app/ prefix so /app/app.js → /opt/kbz/app/app.js, and
    # anything unresolved inside /app/ falls back to index.html so hash
    # routes (e.g. /app/#/dashboard) work after a hard refresh.
    location /app/ {
        alias /opt/kbz/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
        expires 5m;
    }

    location /kbz/ {
        rewrite ^/kbz(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /kbz_starter/ {
        rewrite ^/kbz_starter(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /terminal/ {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 7200s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kibbutznik.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kibbutznik.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.kibbutznik.org) { return 301 https://$host$request_uri; }
    if ($host = kibbutznik.org)     { return 301 https://$host$request_uri; }
    listen 80;
    server_name kibbutznik.org www.kibbutznik.org;
    return 404;
}
