# Nginx config for kibbutznik.org — tracked in-repo so future deploy
# changes are reviewable. Copy to /etc/nginx/sites-enabled/kbz on the
# server and `nginx -s reload`.
#
# Path map:
#   /                         → landing (/opt/kbz/landing/index.html)
#   /memory.html, /index.html → landing static pages
#   /favicon.svg, /logo.svg   → landing assets
#   /avatars/                 → landing/avatars/
#   /app/                     → NEW: human product SPA (/opt/kbz/app/)
#   /kbz/                     → FastAPI backend (127.0.0.1:8000), strips /kbz
#   /kbz_starter/             → auxiliary starter API (127.0.0.1:8001)
#   (terminal/ttyd bridge was removed — unsafe to expose publicly)

server {
    server_name kibbutznik.org www.kibbutznik.org;

    # ── Baseline security headers ──────────────────────────────
    # Applied to every response (including errors — note `always`).
    # Intentionally conservative: no CSP yet because the SPA loads
    # React/Babel from unpkg + Plausible from plausible.io; writing
    # an accurate CSP without breaking those is a separate task.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Branded error pages (HN-launch polish). Default nginx 404 is a
    # tiny "Not Found" string with no link back to the site; same
    # for 5xx. Serve the warm-theme HTML pages instead so a visitor
    # who hits a stale link still has a way back. The `=` prefix
    # rewrites the status preserving the original code.
    error_page 404 = /404.html;
    error_page 500 502 503 504 = /500.html;
    location = /404.html {
        root /opt/kbz/landing;
        internal;
    }
    location = /500.html {
        root /opt/kbz/landing;
        internal;
    }

    location /avatars/ {
        root /opt/kbz/landing;
        expires 7d;
    }

    # Cream-themed copies of the entity avatars used by the
    # warm-theme pages (welcome / guide / ecosystem). Same SVGs
    # but with the dark-navy central disc swapped for white so
    # they pop against the cream background.
    location /avatars-cream/ {
        root /opt/kbz/landing;
        expires 7d;
    }

    location ~ ^/(favicon\.svg|logo\.svg|og-image\.png|apple-touch-icon\.png|favicon-(?:16|32|192|512)\.png)$ {
        root /opt/kbz/landing;
        expires 7d;
    }

    # / serves the new social-friendly welcome page. The old
    # technical/psychedelic landing is still reachable at
    # /index or /index.html via the regex below; welcome.html
    # has a top-nav link to it labeled "psychedelic edition".
    location = / {
        root /opt/kbz/landing;
        try_files /welcome.html =404;
        default_type text/html;
        expires 1h;
    }

    # Static landing pages (index.html, memory.html, todo.html, …).
    # Accept both /todo and /todo.html so clean URLs work.
    # When adding a new static landing page, append its name here.
    # Public, shareable artifact pages — server-rendered by FastAPI
    # at /kbz/artifacts/{uuid}/share with full OG/Twitter meta so
    # social-link previews work. /artifact/{uuid} is the user-facing
    # short URL; nginx rewrites to the proxied path internally.
    # The endpoint visibility-gates: private root communities → 404.
    # Note: regex is double-quoted because nginx tokenizes `{` as a
    # block-start token; without quoting, nginx truncates the regex
    # at the `{36}` quantifier and fails to start.
    location ~ "^/artifact/([0-9a-fA-F-]{36})$" {
        rewrite ^/artifact/(.*)$ /artifacts/$1/share break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(index|memory|todo|welcome|guide|ecosystem|contact)(\.html)?$ {
        root /opt/kbz/landing;
        try_files $uri $uri.html =404;
        default_type text/html;
        expires 1h;
    }

    # Encrypted TODO payload (AES-GCM; useless without the password in the page)
    location = /todo.dat {
        root /opt/kbz/landing;
        default_type application/octet-stream;
        expires 5m;
    }

    # ── Human product (Track C1+C MVP) ─────────────────────────
    # Strips the /app/ prefix so /app/app.js → /opt/kbz/app/app.js, and
    # anything unresolved inside /app/ falls back to index.html so hash
    # routes (e.g. /app/#/dashboard) work after a hard refresh.
    location /app/ {
        alias /opt/kbz/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
        expires 5m;
    }

    location /kbz/ {
        rewrite ^/kbz(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location /kbz_starter/ {
        rewrite ^/kbz_starter(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/kibbutznik.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kibbutznik.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.kibbutznik.org) { return 301 https://$host$request_uri; }
    if ($host = kibbutznik.org)     { return 301 https://$host$request_uri; }
    listen 80;
    server_name kibbutznik.org www.kibbutznik.org;
    return 404;
}
